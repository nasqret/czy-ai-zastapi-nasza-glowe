      <h1>Standardowy test Fermata</h1>
      <p>Przy NWD(a,n)=1 sprawdzamy a<sup>n−1</sup> ≡ 1 (mod n). Jest to równoważne a<sup>n</sup> ≡ a (mod n), ponieważ a ma odwrotność modulo n.</p>
      <p>Liczba 341=11·31 przechodzi test dla a=2, choć jest złożona. Obliczenie pokazuje kontrprzykład; wciąż trzeba matematycznie wyjaśnić ograniczenia testu.</p>
