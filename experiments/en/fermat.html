      <h1>The standard Fermat test</h1>
      <p>When gcd(a,n)=1, test a<sup>n−1</sup> ≡ 1 (mod n). This is equivalent to a<sup>n</sup> ≡ a (mod n) because a has an inverse modulo n.</p>
      <p>The number 341=11·31 passes the test for a=2 although it is composite. The computer found a counterexample; mathematics still needs to explain the test's limitations.</p>
